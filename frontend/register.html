<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SecureAuth Register</title>

    <link rel="stylesheet"
          href="./css/style.css">

</head>

<body>

    <div class="theme-toggle">

        <button id="themeBtn">
            🌙
        </button>

    </div>

    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <div class="container">

        <div class="glass-card">

            <h1>SecureAuth</h1>

            <p class="subtitle">
                Create your secure account
            </p>

            <form id="registerForm">

                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    >

                    <span id="togglePassword">
                        👁
                    </span>

                </div>

                <button type="submit">

                    Register

                </button>

            </form>

            <p id="message"></p>

            <p class="switch-page">

                Already have an account?

                <a href="index.html">
                    Login
                </a>

            </p>

        </div>

    </div>

    <script src="./js/register.js"></script>

</body>

</html>
